services:
  # PostgreSQL 16 con persistencia y healthcheck
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sysdatec
      POSTGRES_PASSWORD: sysdatec
      POSTGRES_DB: tickets
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sysdatec -d tickets"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Aplicación React Router (build de producción)
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://sysdatec:sysdatec@db:5432/tickets
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

# Volumen persistente para datos de PostgreSQL
volumes:
  postgres_data:
